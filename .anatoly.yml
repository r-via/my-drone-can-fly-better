# Anatoly configuration — generated by first-run wizard. Edit freely.
# Optional sections are commented out below — uncomment what you need.

version: 3

# ---- project ---------------------------------------------------------------
project:
  name: my-project

# ---- scan ------------------------------------------------------------------
# Detected from your manifests (package.json, tsconfig.json, Cargo.toml, …)
# and language distribution. Edit freely — these are the strict, authoritative
# globs `collectFiles` consumes.
#
# respect_gitignore (default true): files ignored by .gitignore are filtered
# out by intersecting with `git ls-files`. Set to false to audit gitignored
# files explicitly.
scan:
  include:
    - next-env.d.ts/**/*.{js,jsx,mjs,cjs}
    - next-env.d.ts/**/*.{ts,tsx}
    - src/**/*.{js,jsx,mjs,cjs}
    - src/**/*.{ts,tsx}
  exclude:
    - '**/*.spec.js'
    - '**/*.spec.ts'
    - '**/*.test.js'
    - '**/*.test.ts'
    - '**/*.test.tsx'
    - '**/__fixtures__/**'
    - '**/__mocks__/**'
    - .anatoly/**
    - .git/**
    - .next/**
    - build/**
    - coverage/**
    - dist/**
    - node_modules/**
  respect_gitignore: true

# ---- coverage (optional — defaults shown) ----------------------------------
# coverage:
#   enabled: true
#   command: npx vitest run --coverage.reporter=json
#   report_path: coverage/coverage-final.json

# ---- providers -------------------------------------------------------------
providers:
  anthropic:
    transport: claude_agent_sdk
    auth: oauth
    concurrency: 8
    models:
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
      - claude-opus-4-6
  local-lite:
    transport: onnxruntime_node
    models:
      - jinaai/jina-embeddings-v2-base-code
      - Xenova/all-MiniLM-L6-v2
  #
  # GGUF embeddings via Docker sidecar. Run `anatoly local-embeddings upgrade` first.
  # local-advanced:
  #   transport: openai_compatible
  #   auth: none
  #   concurrency: 8
  #   models:
  #     - nomic-embed-code-gguf
  #     - qwen3-embedding-8b-gguf
  #
  # External embeddings (mistral-embed). Requires MISTRAL_API_KEY.
  # mistral:
  #   transport: openai_compatible
  #   auth: api_key
  #   env_key: MISTRAL_API_KEY
  #   concurrency: 8
  #   models:
  #     - mistral-embed
  #
  # External embeddings/LLM gateway. Requires OPENROUTER_API_KEY.
  # openrouter:
  #   transport: openai_compatible
  #   auth: api_key
  #   env_key: OPENROUTER_API_KEY
  #   concurrency: 8
  #   models:
  #     - qwen/qwen3-embedding-8b

# ---- routing ---------------------------------------------------------------
routing:
  generation:
    quality: anthropic/claude-sonnet-4-6
    fast: anthropic/claude-haiku-4-5-20251001
    deliberation: anthropic/claude-opus-4-6
    summarization: anthropic/claude-haiku-4-5-20251001
  embeddings:
    code: local-lite/jinaai/jina-embeddings-v2-base-code
    text: local-lite/Xenova/all-MiniLM-L6-v2

# ---- commands --------------------------------------------------------------
# Per-command model for standalone LLM commands that run outside an audit
# run (docs arbitrate refresh, init --scope). `model` is the default; a
# command key overrides it. Written explicitly (no hidden defaults); edit
# freely, e.g. set scope to an opus model for a stronger one-shot analysis.
commands:
  model: anthropic/claude-sonnet-4-6
  scope: anthropic/claude-sonnet-4-6
  refresh: anthropic/claude-haiku-4-5-20251001

# ---- evaluation ------------------------------------------------------------
evaluation:
  axes:
    utility: true
    duplication: true
    correction: true
    overengineering: true
    tests: true
    best_practices: true
    documentation:
      enabled: true
      reference:
        paths:
          - docs/**/*.md
          - README.md
          - CONTRIBUTING.md
        inline_comments:
          enabled: false
      internal:
        mode: lite
# Per-axis override example — replaces routing.generation.quality for that axis:
#   correction:
#     enabled: true
#     model: anthropic/claude-opus-4-6
# Documentation axis: edit reference.paths to point at your human docs,
# and internal.mode to "full" for LLM-generated internal pages or "off"
# to disable internal doc generation entirely. See docs for details.

# ---- invariants ------------------------------------------------------------
# Pre-deliberation invariants phase (NOT an axis): checks cross-representation
# consistency (code-vs-code and code-vs-doc numerical targets) before
# deliberation. High-precision, requires RAG. Set enabled: false to skip it.
invariants:
  enabled: true

