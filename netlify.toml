[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Liens de partage : /s sert l'aperçu OG (Discord, Slack) puis redirige vers
# l'app en préservant le fragment #r=… (voir netlify/functions/share-preview.ts).
[[redirects]]
  from = "/s"
  to = "/.netlify/functions/share-preview"
  status = 200

# Le service worker doit être revalidé à chaque visite, sinon un nouveau build
# reste invisible tant que l'ancien sw.js est en cache HTTP.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Chunks hashés par Next : immuables, jamais revalidés.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
